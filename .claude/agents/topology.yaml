# Agent Orchestration Topology
# Defines how agents coordinate across the Ouroboros workflow.
#
# Patterns:
#   pipeline    — Sequential execution, output of one feeds next
#   fan-out     — Parallel execution, results merged
#   expert-pool — Best agent selected based on context
#   producer-reviewer — One creates, another validates
#   supervisor  — One agent delegates to others
#   navigator-driver — Pair programming with persistent feedback loop

# ─── Ouroboros Workflow Topology ────────────────────────────────────
workflows:
  interview:
    pattern: "pipeline"
    agents: [interviewer]
    description: "Single agent asks questions sequentially"
    flow:
      - agent: interviewer
        input: "user topic"
        output: ".harness/ouroboros/interviews/*.yaml"

  seed:
    pattern: "pipeline"
    agents: [ontologist, seed-architect]
    description: "Ontologist extracts domain model, Seed Architect crystallizes spec"
    flow:
      - agent: ontologist
        input: "interview data"
        output: "ontology (entities, actions, relationships)"
      - agent: seed-architect
        input: "ontology + interview"
        output: ".harness/ouroboros/seeds/seed-v*.yaml"

  run:
    pattern: "pipeline"
    agents: [architect, seed-architect]
    description: "Architect designs, then executes Double Diamond"
    flow:
      - agent: architect
        phase: "design"
        input: "seed spec"
        output: "implementation plan"
      - agent: seed-architect
        phase: "deliver"
        input: "plan + seed spec"
        output: "implemented code"

  # ─── Pair Mode (v2.1.0) ──────────────────────────────────────────
  # Activated per-AC based on complexity field in seed spec.
  # NOT a global toggle — mixed mode (direct + pair) is default.
  run-pair:
    pattern: "navigator-driver"
    agents: [navigator, architect, test-designer]
    description: >
      Navigator plans, Driver implements, Test Designer validates independently.
      Navigator runs as a persistent background agent with SendMessage communication.
      Test Designer runs in worktree isolation to prevent implementation bias.
    activation: "AC complexity field: medium or high"
    flow:
      - step: "spawn-navigator"
        agent: navigator
        lifecycle: "background (persistent throughout session)"
        communication: "SendMessage (bidirectional with Driver)"
        input: "seed spec + architecture invariants + codebase structure"
        state: "maintains failure history, attempt counts, completed AC list"

      - step: "ac-loop"
        description: "For each medium/high complexity AC"
        substeps:
          - "Driver → SendMessage → Navigator: AC 플랜 요청"
          - "Navigator → 응답: 3 plans + selected plan + driver instructions"
          - "Driver: implements following navigator instructions"
          - "Driver → SendMessage → Navigator: 구현 결과 보고"
          - "Navigator → 응답: Pass / Retry / Switch / Escalate"
        max_roundtrips: 5
        on_max_exceeded: "/unstuck"

      - step: "test-designer"
        agent: test-designer
        lifecycle: "one-shot (spawned after all pair ACs complete)"
        isolation: "worktree (physically prevents reading implementation code)"
        input: "seed spec + AC list (embedded in prompt, NOT file paths)"
        output: "tests/ directory with AC-based test files"

      - step: "auto-review"
        trigger: "every 3 completed pair-mode ACs"
        action: "inline drift check against seed spec"

    mixed_mode:
      description: >
        When seed spec contains both low and medium/high complexity ACs:
        1. Direct deliver all low-complexity ACs first (build foundation)
        2. Spawn Navigator for medium/high ACs (better plans with foundation in place)
        3. Spawn Test Designer after all pair ACs complete (high complexity only)
      order: "low → medium → high"

  evaluate:
    pattern: "producer-reviewer"
    agents: [evaluator]
    description: "Evaluator verifies implementation against seed"
    flow:
      - agent: evaluator
        role: "reviewer"
        input: "code + seed spec"
        output: ".harness/ouroboros/evaluations/*.yaml"

  evolve:
    pattern: "fan-out"
    agents: [contrarian, simplifier, researcher]
    description: "Multiple perspectives analyze failures in parallel"
    flow:
      - agent: contrarian
        role: "challenge assumptions"
        parallel: true
      - agent: simplifier
        role: "find unnecessary complexity"
        parallel: true
      - agent: researcher
        role: "gather evidence"
        parallel: true
    merge: "synthesis of all perspectives → new seed version"

  unstuck:
    pattern: "expert-pool"
    agents: [contrarian, simplifier, researcher, architect, hacker]
    description: "5 agents each analyze from their perspective"
    selection: "all — user picks best approach"
    flow:
      - agent: contrarian
        question: "What if the opposite were true?"
      - agent: simplifier
        question: "What can be removed?"
      - agent: researcher
        question: "What does the evidence say?"
      - agent: architect
        question: "Is this a structural problem?"
      - agent: hacker
        question: "Is there a creative workaround?"

# ─── Orchestration Patterns Reference ──────────────────────────────
patterns:
  pipeline:
    description: "순차 실행. 이전 에이전트의 출력이 다음의 입력"
    when: "단계별 정제가 필요할 때 (interview → seed)"
    risk: "한 단계 실패 시 전체 중단"

  fan-out:
    description: "병렬 실행. 여러 에이전트가 동시에 분석 후 결과 병합"
    when: "다양한 관점이 필요할 때 (/evolve, /unstuck)"
    risk: "상충되는 결과 병합이 필요"

  expert-pool:
    description: "전문가 풀에서 상황에 맞는 에이전트 선택 또는 전원 투입"
    when: "문제 유형이 불명확할 때 (/unstuck)"
    risk: "선택 기준이 모호할 수 있음"

  producer-reviewer:
    description: "생산자-검토자 분리. 한 에이전트가 만들고 다른 에이전트가 검증"
    when: "품질 검증이 필요할 때 (/run → /evaluate)"
    risk: "검토자가 생산자의 맥락을 놓칠 수 있음"

  supervisor:
    description: "감독 에이전트가 다른 에이전트에게 작업을 위임"
    when: "복잡한 멀티에이전트 작업 조율 시"
    risk: "감독 에이전트가 병목이 될 수 있음"

  navigator-driver:
    description: >
      짝 프로그래밍 패턴.
      Navigator를 background agent로 spawn → SendMessage로 양방향 통신.
      AC별 플랜 3개 생성 → 최적 선택 → Driver 구현 → Navigator 검토 → 반복.
      Test Designer는 worktree 격리로 구현 편향 없는 독립 테스트 설계.
    when: "AC complexity가 medium 또는 high일 때"
    risk: "플랜 생성에 토큰이 추가 소모됨. low complexity AC에서는 오버헤드"
    reference: "PairCoder (ASE 2024) + AgentCoder (2024)"
    v2_1_changes:
      - "환경변수 토글 → AC complexity 기반 자동 판단"
      - "단방향 Agent 호출 → SendMessage 기반 persistent 양방향 통신"
      - "Test Designer: 경로 차단 지시 → worktree 물리적 격리"
      - "Mixed Mode: low는 direct, medium/high만 pair"

# ─── Agent Capabilities Matrix ─────────────────────────────────────
capabilities:
  interviewer:
    can: [ask_questions, track_ambiguity, discover_assumptions]
    cannot: [write_code, give_solutions, make_decisions]

  ontologist:
    can: [extract_entities, define_relationships, model_domain]
    cannot: [write_code, make_tech_decisions]

  seed-architect:
    can: [crystallize_spec, version_seeds, validate_completeness]
    cannot: [skip_constraints, modify_existing_seeds]

  evaluator:
    can: [run_gates, verify_ac, measure_drift, judge_quality]
    cannot: [fix_code, modify_spec]

  contrarian:
    can: [challenge_assumptions, propose_alternatives, question_decisions]
    cannot: [implement_solutions]

  simplifier:
    can: [identify_complexity, suggest_removal, find_abstractions]
    cannot: [add_features]

  researcher:
    can: [investigate_facts, find_evidence, compare_approaches]
    cannot: [make_decisions, write_code]

  architect:
    can: [analyze_structure, identify_patterns, design_systems]
    cannot: [implement_details]

  hacker:
    can: [find_workarounds, bypass_constraints_safely, prototype]
    cannot: [make_permanent_decisions]

  navigator:
    can: [generate_plans, select_optimal_plan, review_results, direct_driver, maintain_failure_history]
    cannot: [write_code, modify_files, run_tests]
    lifecycle: "persistent background agent (SendMessage communication)"

  test-designer:
    can: [design_tests, write_test_files, analyze_ac, find_edge_cases]
    cannot: [read_implementation_code, modify_source, make_design_decisions]
    lifecycle: "one-shot worktree-isolated agent"
