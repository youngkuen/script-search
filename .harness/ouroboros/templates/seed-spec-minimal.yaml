# Minimal Seed Specification — for small features (1-3 files, single layer)
# Generated by: /seed command (minimal mode)
# Use the full seed-spec.yaml for cross-layer or multi-entity features.
# WARNING: Seeds are immutable. To change, create a new version.

version: 1
created: "YYYY-MM-DDTHH:MM:SS"
interview_ref: ""          # optional for minimal seeds

goal: ""                   # One clear sentence describing what this does

constraints:
  must:                    # Absolute requirements (at least 1)
    - ""
  must_not:                # Absolute prohibitions (at least 1)
    - ""

acceptance_criteria:       # At least 2, each testable
  - id: "AC-001"
    description: ""
    verification: "automated"   # automated | manual
    complexity: "low"           # low | medium | high — Pair Mode 활성화 기준
  - id: "AC-002"
    description: ""
    verification: "automated"
    complexity: "low"

# ─── Optional fields (fill if relevant) ──────────────────────────

scope:                     # Optional: list out-of-scope items
  out_of_scope: []

layer: ""                  # Optional: presentation | logic | data (if single-layer)

notes: ""                  # Optional: free-form context
