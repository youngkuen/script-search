date: "2026-07-09T14:30:00"
topic: "강의 스크립트 의미 검색기 — 1~3주차 실습으로 만드는 개인 미니 프로젝트"
dimensions:
  goal_clarity: 0.95
  constraint_clarity: 0.90
  success_criteria: 0.90
ambiguity_score: 0.08
answers:
  - question: "무엇을 만들고 싶은가 / 범위는 어디까지인가"
    answer: >
      강의 스크립트(1~3주차 txt)를 임베딩+ChromaDB+BM25 하이브리드 검색으로
      찾아주는 CLI. 답을 생성하지 않고 순위별로 찾아주기만 한다.
      RAG(5주차)·FastAPI 서빙(11주차)·배포(12주차)는 범위 밖.
    dimension: goal
    clarity_delta: +0.90
  - question: "임베딩 모델과 검색 대상 데이터는?"
    answer: "로컬 오픈소스 다국어 모델(intfloat/multilingual-e5-small 등), 1~3주차 강의 스크립트만"
    dimension: constraints
    clarity_delta: +0.20
  - question: "Hit Rate@5나 MRR이 몇 점 이상이면 잘 만든 것으로 볼까?"
    answer: "명확한 수치 목표 설정 — Hit Rate@5 ≥ 0.8, MRR ≥ 0.5 (관대한 기준, 골든셋 샘플이 15~20개로 적은 것을 감안)"
    dimension: success
    clarity_delta: +0.30
  - question: "골든셋에서 정답을 어떻게 판정할까?"
    answer: "다단계 관련도 점수 부여 (완전 일치=3점, 부분 관련=1~2점) — 3주차 relevance_scores 방식과 동일, NDCG까지 확장 가능"
    dimension: success
    clarity_delta: +0.15
  - question: "alpha(BM25 vs Vector 가중치)를 확정하는 기준은?"
    answer: "Hit Rate와 MRR 두 지표의 평균/조화평균으로 종합 판단"
    dimension: success
    clarity_delta: +0.10
  - question: "검색 결과가 아예 없을 때 어떻게 반응해야 하나?"
    answer: "임계값 기준 혼합 방식 — 점수가 임계값 이상인 것만 보여주고, 전부 미달이면 '관련 내용을 찾지 못했습니다' 표시"
    dimension: constraints
    clarity_delta: +0.15
  - question: "스크립트 파일이 인코딩 오류·빈 파일이면?"
    answer: "조용히 건너뛰기 (로그에만 남김) — 전체 파이프라인은 멈추지 않음"
    dimension: constraints
    clarity_delta: +0.10
  - question: "응답 속도 기준이 있나?"
    answer: "처음엔 신경 쓰지 않아도 되지만, 나중에 개선 방법을 찾아보고 싶음 — 하드 제약 아님, 향후 개선 과제로 기록"
    dimension: constraints
    clarity_delta: +0.05
  - question: "레이어를 어떻게 나누고 싶은가?"
    answer: "3단으로 명확히 분리 — CLI 입출력 / 검색·랭킹 로직 / ChromaDB·BM25 데이터 접근"
    dimension: constraints
    clarity_delta: +0.10
  - question: "청크 파싱·임베딩 로직을 개별 테스트할 필요가 있나?"
    answer: "핵심 로직(청크 파싱, 임베딩, 하이브리드 스코어링)은 개별 테스트 작성. 전체 파이프라인은 Phase 5 골든셋 평가가 테스트 역할을 겸함"
    dimension: success
    clarity_delta: +0.10
decisions:
  - "성공 기준: Hit Rate@5 ≥ 0.8, MRR ≥ 0.5 (golden set 15~20문항 기준)"
  - "골든셋은 relevance_scores(0~3점) 다단계 방식으로 구축 — 추후 NDCG 확장 여지 남김"
  - "alpha는 Hit Rate·MRR의 평균/조화평균이 최대가 되는 값으로 확정"
  - "검색 결과 없음은 임계값(threshold) 기준으로 판정 — 구체적 임계값은 실측 데이터로 캘리브레이션 (구현 단계에서 결정)"
  - "파일 오류는 파이프라인을 멈추지 않고 로그만 남기고 skip"
  - "레이어: Presentation(CLI) / Logic(검색·랭킹·평가) / Data(ChromaDB, BM25 인덱스) 3단 분리"
  - "테스트: 청크 파싱/임베딩/하이브리드 스코어링은 단위 테스트, 전체 흐름은 골든셋 평가로 검증"
  - "응답 속도는 MVP 제약이 아님 — 향후 개선 과제로 백로그에 남김"
assumptions_surfaced:
  - "골든셋 샘플 수가 적다는 것을 스스로 인지하고, 그에 맞춰 관대한 수치 목표를 설정함 — 대규모 벤치마크 기준을 그대로 가져오지 않음"
  - "검색 실패(결과 없음) 케이스를 미리 설계에 포함시킴 — 처음엔 '항상 뭔가 나온다'고 가정하기 쉬운 지점"
  - "레이어 분리를 개인 미니 프로젝트에도 적용하기로 함 — 오버엔지니어링 우려보다 배운 개념(3-tier)을 직접 연습해보는 것을 선택"
