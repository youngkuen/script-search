# Code Convention
# AI 에이전트가 코드를 생성할 때 따라야 하는 규칙입니다.
# stacks 필드로 적용 대상을 필터링합니다.
#
# stacks 값: all, typescript, python, nextjs, nestjs, django, fastapi, prisma, alembic, monorepo
#
# Conventions compiled from common patterns across the Korean engineering community.
# Independently authored for this template.

# ─── 3-Tier Layer Separation Rules ──────────────────────────────────
three_tier:
  - id: LAYER-001
    rule: >
      Presentation 레이어(컴포넌트, 페이지, 컨트롤러, 라우트)에 비즈니스 로직을 넣지 않는다.
      요청 파싱, 응답 포맷팅, UI 렌더링만 담당한다.
    stacks: [all]
  - id: LAYER-002
    rule: >
      Logic 레이어(서비스, 도메인)는 Presentation 프레임워크(React, Vue, Angular, Flask templates)를
      import하지 않는다. 프레임워크 독립적으로 유지한다.
    stacks: [all]
  - id: LAYER-003
    rule: >
      Data 레이어(레포지토리, ORM, DB 드라이버)에 비즈니스 로직이나 Presentation 코드를 넣지 않는다.
      데이터 접근과 외부 연동만 담당한다.
    stacks: [all]
  - id: LAYER-004
    rule: >
      레이어 간 데이터 전달은 DTO/Interface를 통해서만 한다.
      내부 도메인 모델이나 ORM Entity를 레이어 경계 너머로 직접 전달하지 않는다.
    stacks: [all]
  - id: LAYER-005
    rule: >
      레이어를 건너뛰지 않는다. Presentation → Logic → Data 순서로만 호출한다.
      Presentation에서 Data를 직접 호출하거나, Data에서 Logic을 역참조하는 것을 금지한다.
    stacks: [all]
  - id: LAYER-006
    rule: >
      구현과 테스트를 함께 작성한다. Logic 레이어는 순수 비즈니스 로직에 집중하여 테스트하고,
      mock은 레이어 경계에서만 사용한다. 접착제 코드를 mock으로 테스트하지 않는다.
    stacks: [all]

general:
  - id: GEN-001
    rule: 함수는 하나의 책임만 수행한다. 길이가 50줄을 초과하면 쪼개는 것을 고려한다.
    stacks: [all]
  - id: GEN-002
    rule: 코드에 숫자 리터럴을 직접 박지 않는다. 명명된 상수로 뽑아낸다.
    stacks: [all]
  - id: GEN-003
    rule: 예외는 실제로 처리 가능한 지점에서 붙잡는다. 모든 에러를 상위로 던지기만 하는 코드는 금지한다.
    stacks: [all]
  - id: GEN-004
    rule: 새 라이브러리를 도입하기 전에 기존 의존성으로 해결 가능한지 먼저 확인한다.
    stacks: [all]
  - id: GEN-005
    rule: 환경 변수는 하드코딩하지 않는다. 반드시 설정 파일이나 환경 변수로 관리한다.
    stacks: [all]
  - id: GEN-006
    rule: 주석은 "왜(why)"를 설명한다. "무엇(what)"은 코드 자체가 설명해야 한다.
    stacks: [all]

typescript:
  - id: TS-001
    rule: any는 쓰지 않는다. 타입을 좁힐 수 없을 땐 unknown과 타입 가드 조합으로 다룬다.
    stacks: [typescript]
  - id: TS-002
    rule: 인터페이스 이름 앞에 I를 붙이지 않는다 (IUser가 아니라 User로).
    stacks: [typescript]
  - id: TS-003
    rule: enum 대신 const 객체에 as const를 붙여 유니온 타입으로 쓴다.
    stacks: [typescript]
  - id: TS-004
    rule: index.ts를 통한 re-export는 패키지의 공개 경계에만 둔다. 같은 패키지 내부에서는 파일을 직접 import한다.
    stacks: [typescript]
  - id: TS-005
    rule: 깊은 상대 경로(../../..) 대신 path alias(@/lib, @/components)를 사용한다.
    stacks: [typescript]

python:
  - id: PY-001
    rule: 타입 힌트를 모든 함수의 매개변수와 반환값에 적용한다.
    stacks: [python]
  - id: PY-002
    rule: f-string을 사용한다. format()이나 % 포매팅을 사용하지 않는다.
    stacks: [python]
  - id: PY-003
    rule: 모듈 수준의 전역 변수를 최소화한다. 설정값은 config 모듈에서 관리한다.
    stacks: [python]
  - id: PY-004
    rule: async 함수와 sync 함수를 혼용하지 않는다. 하나의 모듈은 하나의 실행 모델을 따른다.
    stacks: [python]

nextjs:
  - id: NEXT-001
    rule: 기본값은 서버 컴포넌트다. "use client"는 상호작용이 실제로 필요한 최말단 컴포넌트에만 붙인다.
    stacks: [nextjs]
  - id: NEXT-002
    rule: 데이터 조회/변경은 서버 컴포넌트나 Server Action에서 실행한다. 브라우저에서 직접 fetch를 띄우지 않는다.
    stacks: [nextjs]
  - id: NEXT-003
    rule: page.tsx에는 조립만 둔다. 실제 로직은 커스텀 훅이나 서비스 함수로 빼낸다.
    stacks: [nextjs]
  - id: NEXT-004
    rule: 이미지는 next/image를 사용한다. img 태그를 직접 사용하지 않는다.
    stacks: [nextjs]

nestjs:
  - id: NEST-001
    rule: Controller의 책임은 HTTP ↔ 내부 타입 변환뿐이다. 도메인 로직은 Service 계층으로 옮긴다.
    stacks: [nestjs]
  - id: NEST-002
    rule: DTO 필드에는 class-validator 제약을 선언한다. 검증 데코레이터가 없는 DTO는 받지 않는다.
    stacks: [nestjs]
  - id: NEST-003
    rule: 외부 서비스·리포지토리는 모듈 providers에 등록해 생성자 주입으로만 받는다. new 키워드로 직접 인스턴스화하지 않는다.
    stacks: [nestjs]
  - id: NEST-004
    rule: API 응답은 통일된 형식을 따른다. { data, error, meta } 구조를 사용한다.
    stacks: [nestjs]

fastapi:
  - id: FA-001
    rule: 라우트 함수는 요청 파싱과 응답 반환만 담당한다. 비즈니스 로직은 서비스 모듈에 둔다.
    stacks: [fastapi]
  - id: FA-002
    rule: 모든 요청/응답에 Pydantic 모델을 사용한다.
    stacks: [fastapi]
  - id: FA-003
    rule: DB 세션은 Depends()를 통해 주입받는다. 라우트에서 직접 생성하지 않는다.
    stacks: [fastapi]
  - id: FA-004
    rule: 라우트 핸들러는 async def를 기본으로 한다.
    stacks: [fastapi]

django:
  - id: DJ-001
    rule: 비즈니스 로직은 Model/Manager에 둔다. View는 얇게 유지한다.
    stacks: [django]
  - id: DJ-002
    rule: Raw SQL 대신 Django ORM을 사용한다. 불가피한 경우만 예외.
    stacks: [django]
  - id: DJ-003
    rule: 기존 마이그레이션 파일을 수정하지 않는다. 새 마이그레이션을 생성한다.
    stacks: [django]

monorepo:
  - id: MONO-001
    rule: 모노레포 내 다른 패키지를 참조할 땐 workspace:* 프로토콜로 지정한다.
    stacks: [monorepo]
  - id: MONO-002
    rule: 여러 앱이 공유하는 타입은 packages/types, 유틸 함수는 packages/utils 패키지로 모은다.
    stacks: [monorepo]
  - id: MONO-003
    rule: turbo.json의 pipeline·cache 설정 수정은 팀 리뷰 PR을 거쳐 반영한다.
    stacks: [monorepo]
